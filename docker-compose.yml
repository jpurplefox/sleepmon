services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sleepmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sleepmon}
      POSTGRES_DB: ${POSTGRES_DB:-sleepmon}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sleepmon} -d ${POSTGRES_DB:-sleepmon}"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sleepmon}:${POSTGRES_PASSWORD:-sleepmon}@db:5432/${POSTGRES_DB:-sleepmon}
      # OAuth Client ID de Google (mismo proyecto que VITE_GOOGLE_CLIENT_ID del
      # frontend) y secreto para firmar los JWT de sesión — sin valor por
      # defecto: hay que exportarlos en el entorno antes de levantar el stack.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      # Montamos todo el directorio (sobrevive a git checkout y a reemplazos de
      # archivos), y un volumen anónimo preserva el node_modules de la imagen.
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
