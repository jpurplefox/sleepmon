name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sleepmon
          POSTGRES_PASSWORD: sleepmon
          POSTGRES_DB: sleepmon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sleepmon -d sleepmon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://sleepmon:sleepmon@localhost:5432/sleepmon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy src

      - name: Tests (pytest)
        # Incluye los tests de integración: corren contra el Postgres del servicio.
        run: pytest
