name: Deploy

# Despliega al hacer push a main: corre los tests, aplica migraciones y publica
# backend (Lambda vía imagen ECR) y frontend (S3 + invalidación de CloudFront).
# La autenticación con AWS es por OIDC (rol asumido), sin claves de larga vida.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: sa-east-1
  ECR_REPOSITORY: sleepmon-lambda
  LAMBDA_FUNCTION: sleepmon-api
  S3_BUCKET: sleepmon-frontend

permissions:
  id-token: write # OIDC: necesario para configure-aws-credentials
  contents: read

jobs:
  test:
    name: Test (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sleepmon
          POSTGRES_PASSWORD: sleepmon
          POSTGRES_DB: sleepmon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sleepmon -d sleepmon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://sleepmon:sleepmon@localhost:5432/sleepmon_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Type-check (mypy)
        run: mypy src
      - name: Tests (pytest)
        run: pytest

  migrate:
    name: Migrate DB (yoyo)
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install package
        run: pip install .
      - name: Apply migrations
        env:
          # DSN de la RDS de producción (misma instancia que whos-that, base propia).
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m sleepmon.adapters.outbound.postgres.migrate

  deploy-backend:
    name: Deploy backend (Lambda)
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build --platform linux/amd64 -f backend/Dockerfile.lambda -t "$IMAGE_URI" backend
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --image-uri "$IMAGE_URI" \
            --publish

  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          # URL pública de la API (Lambda Function URL o dominio de API Gateway) y
          # el Client ID de Google. Se hornean en el bundle en build time.
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync dist "s3://$S3_BUCKET" --delete
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
